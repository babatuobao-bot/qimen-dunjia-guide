  "死门+戊":"作伪财","死门+乙":"求事不成","死门+丙":"信息忧疑","死门+丁":"老阳人疾病",
  "死门+己":"病讼牵连不已，凶","死门+庚":"女人生产母子俱凶","死门+辛":"盗贼失脱难获","死门+壬":"讼人自讼自招","死门+癸":"妇女嫁娶事凶",
  "惊门+戊":"损财信阻","惊门+乙":"谋财不得","惊门+丙":"文书印信惊恐","惊门+丁":"词讼牵连",
  "惊门+己":"恶犬伤人成讼","惊门+庚":"道路损折遇贼盗，凶","惊门+辛":"女人成讼，凶","惊门+壬":"官司囚禁，病者大凶","惊门+癸":"被盗失物难获"
  };

  for(var pi=0;pi<pds.length;pi++){
    var pd=pds[pi];
    if(!pd.mn)continue;
    var bk=pd.mn+'+'+pd.dg,be=BMKY[bk];
    if(!be)continue;
    htm += '<div style="margin:0.3rem 0;font-size:0.88rem;"><b>'+GONG_INFO[pd.g].gua+pd.g+'宫</b>：'+pd.mn+' + '+pd.dg+' → '+be+'</div>';
  }
  htm += '</div>';

  // 总结
  htm += '<h2>排盘总览</h2>';
  htm += '<div class="step-card">';
  htm += '<table style="font-size:0.85rem;">';
  htm += '<tr><th>项目</th><th>结果</th></tr>';
  htm += '<tr><td>公历</td><td>'+y+'年'+m+'月'+d+'日 '+ts+'</td></tr>';
  htm += '<tr><td>四柱</td><td><b>'+ygz+'年 '+mgz+'月 '+dgz+'日 '+hgz+'时</b></td></tr>';
  htm += '<tr><td>节气</td><td>'+term+'</td></tr>';
  htm += '<tr><td>局数</td><td>'+(yd?'阳遁':'阴遁')+ju+'局 · '+yn[yuan]+'</td></tr>';
  htm += '<tr><td>旬首</td><td>'+xsh+'</td></tr>';
  htm += '<tr><td>值符星</td><td style="color:var(--bl);font-weight:bold;">'+zfx+'（落'+sgg+'宫）</td></tr>';
  htm += '<tr><td>值使门</td><td style="color:var(--ac);font-weight:bold;">'+zsm+'（落'+zsg+'宫）</td></tr>';
  htm += '</table>';
  htm += '</div>';

  document.getElementById("result").innerHTML = htm;

  // 滚动到结果
  document.getElementById("result").scrollIntoView({behavior:"smooth",block:"start"});
  } catch(e) {
    document.getElementById("result").innerHTML = '<p style="color:#c94b4b;font-weight:bold;">排盘出错：' + e.message + '</p><pre style="color:var(--dim);font-size:0.8rem;">' + (e.stack||'') + '</pre>';
    console.error(e);
  }
}

// ========== 渲染函数 ==========
function renderGrid(highlightG,getter,title,type){
  var h='<p style="font-weight:bold;margin-top:0.5rem;">'+title+'</p>';
  h+='<div class="grid3">';
  for(var i=0;i<9;i++){
    var g=GRID[i],info=GONG_INFO[g],v=getter(g);
    var hl=(g===highlightG)?' style="border:2px solid var(--ac);"':'';
    h+='<div class="gcell"'+hl+'>';
    h+='<div class="gn">'+info.gua+g+'·'+info.dir+'</div>';
    h+='<div class="'+type+'" style="font-size:1rem;">'+v+'</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderGridStar(tp,title,type){
  var h='<p style="font-weight:bold;margin-top:0.5rem;">'+title+'</p>';
  h+='<div class="grid3">';
  for(var i=0;i<9;i++){
    var g=GRID[i],info=GONG_INFO[g],v=tp[g]||"";
    h+='<div class="gcell">';
    h+='<div class="gn">'+info.gua+g+'·'+info.dir+'</div>';
    h+='<div class="'+type+'" style="font-size:0.9rem;">'+v+'</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderGridDoor(rp,title,type){
  var h='<p style="font-weight:bold;margin-top:0.5rem;">'+title+'</p>';
  h+='<div class="grid3">';
  for(var i=0;i<9;i++){
    var g=GRID[i],info=GONG_INFO[g],v=rp[g]||"";
    if(g===5)v='—（寄坤二）';
    h+='<div class="gcell">';
    h+='<div class="gn">'+info.gua+g+'·'+info.dir+'</div>';
    h+='<div class="'+type+'" style="font-size:0.9rem;">'+v+'</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderGridGod(sp,title,type){
  var h='<p style="font-weight:bold;margin-top:0.5rem;">'+title+'</p>';
  h+='<div class="grid3">';
  for(var i=0;i<9;i++){
    var g=GRID[i],info=GONG_INFO[g],v=sp[g]||"";
    if(g===5)v='—';
    h+='<div class="gcell">';
    h+='<div class="gn">'+info.gua+g+'·'+info.dir+'</div>';
    h+='<div class="'+type+'" style="font-size:0.85rem;">'+v+'</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderFullGrid(dp,tp,rp,sp,tpg){
  var h='<div class="grid3">';
  for(var i=0;i<9;i++){
    var g=GRID[i],info=GONG_INFO[g];
    if(g===5){
      h+='<div class="gcell" style="opacity:0.5;">';
      h+='<div class="gn">中5</div>';
      h+='<div style="font-size:0.68rem;color:var(--dim);">天禽·寄坤二</div>';
      h+='</div>';
      continue;
    }
    var sh=sp[g]||"",mn=rp[g]||"",xn=tp[g]||"",dg=dp[g]||"",tg=tpg[g]||"";
    h+='<div class="gcell">';
    h+='<div class="gn">'+info.gua+g+'·'+info.dir+'</div>';
    h+='<div class="god" style="font-size:0.7rem;">'+sh+'</div>';
    h+='<div class="star" style="font-size:0.8rem;">'+xn+'</div>';
    h+='<div class="door" style="font-size:0.8rem;">'+mn+'</div>';
    h+='<div style="font-size:0.7rem;color:var(--dim);">天:'+tg+' 地:'+dg+'</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

// ========== 页面入口 ==========
function initPage(){
  // 确保默认日期
  var dEl=document.getElementById("simDate");
  var tEl=document.getElementById("simTime");
  if(!dEl.value)dEl.value="2022-06-01";
  if(!tEl.value)tEl.value="08:00";
  run();
}

// DOMContentLoaded 可能已触发，用 readyState 兜底
if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",initPage);
} else {
  initPage();
}
</script>
